services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold -d golddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.io/dragonflydb/dragonfly:v1.27.1

  ws_listener:
    build: .
    command: python -u /app/ingestors/ws_listener.py
    depends_on:
      - kafka
    env_file: .env
    environment:
      WS_TICKERS: "DX-Y.NYB,EURUSD=X,USDJPY=X,GBPUSD=X"
    restart: unless-stopped

  intraday-collector:
    build: .
    command: python -u /app/ml_pipeline/collector.py
    volumes:
      - ./ml_pipeline:/app/ml_pipeline
      - model_storage:/app/models
    depends_on:
      - dragonfly
      - postgres
    env_file: .env
    environment:
      COLLECT_INTERVAL: "60"
    restart: unless-stopped

  predictor:
    build: .
    command: python -u /app/ml_pipeline/predictor.py
    depends_on:
      - kafka
      - dragonfly
    env_file: .env
    environment:
      MODEL_PATH: /app/models/dxy_model.pkl
      ROLLING_WINDOW: "20"
    volumes:
      - model_storage:/app/models
    restart: unless-stopped

  sink:
    build: .
    command: python -u /app/ml_pipeline/sink.py
    depends_on:
      - kafka
      - dragonfly
      - postgres
    env_file: .env
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run /app/streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app/streamlit_app
      - model_storage:/app/models
    depends_on:
      - dragonfly
      - postgres
    env_file: .env
    restart: unless-stopped

  prefect-server:
    image: prefecthq/prefect:3-latest
    platform: linux/amd64
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PREFECT_ORM_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    restart: unless-stopped

  prefect-worker:
    build: .
    command: >
      sh -c "
        prefect work-pool create --type process default 2>/dev/null;
        prefect worker start --pool default --type process
      "
    volumes:
      - model_storage:/app/models
      - ./ml_pipeline:/app/ml_pipeline
    depends_on:
      - prefect-server
    env_file: .env
    restart: unless-stopped

  training-flow:
    build: .
    command: python -u /app/ml_pipeline/training_flow.py
    volumes:
      - model_storage:/app/models
      - ./ml_pipeline:/app/ml_pipeline
    depends_on:
      - prefect-server
      - kafka
      - dragonfly
    env_file: .env
    environment:
      MODEL_PATH: /app/models/dxy_model.pkl
      ROLLING_WINDOW: "20"
    restart: unless-stopped

volumes:
  model_storage:
