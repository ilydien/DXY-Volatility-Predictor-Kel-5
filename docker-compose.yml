services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold -d golddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.io/dragonflydb/dragonfly:v1.27.1
    volumes:
      - dfdata:/data
    command: ["dragonfly", "--dbfilename", "df-snapshot", "--requirepass", "${DRAGONFLY_PASSWORD}"]

  ws_listener:
    build: .
    command: python -u /app/ingestors/ws_listener.py
    depends_on:
      - kafka
    env_file: .env
    environment:
      WS_TICKERS: "DX-Y.NYB,EURUSD=X,USDJPY=X,GBPUSD=X"
    restart: unless-stopped

  intraday-collector:
    build: .
    command: python -u /app/ml_pipeline/collector.py
    volumes:
      - ./ml_pipeline:/app/ml_pipeline
      - model_storage:/app/models
    depends_on:
      - dragonfly
      - postgres
    env_file: .env
    environment:
      COLLECT_INTERVAL: "60"
    restart: unless-stopped

  predictor:
    build: .
    command: python -u /app/ml_pipeline/predictor.py
    depends_on:
      - kafka
      - dragonfly
    env_file: .env
    environment:
      FORCE_PUBLISH_INTERVAL: "2"
      MODEL_PATH: /app/models/dxy_model.pkl
      ROLLING_WINDOW: "20"
    volumes:
      - model_storage:/app/models
    restart: unless-stopped

  sink:
    build: .
    command: python -u /app/ml_pipeline/sink.py
    depends_on:
      - kafka
      - dragonfly
      - postgres
    env_file: .env
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run /app/streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app/streamlit_app
      - model_storage:/app/models
    depends_on:
      - dragonfly
      - postgres
    env_file: .env
    restart: unless-stopped

  prefect-server:
    image: prefecthq/prefect:3-latest
    platform: linux/amd64
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
      - "4222:4222"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PREFECT_API_URL: http://localhost:4200/api
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PREFECT_SERVER_METRICS_PORT: "4222"
    restart: unless-stopped

  prefect-worker:
    build: .
    command: >
      sh -c "
        pip install dbt-postgres -q --no-cache-dir &&
        prefect work-pool create --type process default 2>/dev/null;
        prefect worker start --pool default --type process
      "
    volumes:
      - model_storage:/app/models
      - ./ml_pipeline:/app/ml_pipeline
      - ./dbt:/dbt
    depends_on:
      - prefect-server
    env_file: .env
    environment:
      PYTHONPATH: /app/ml_pipeline
    restart: unless-stopped

  alert-bot:
    build: .
    command: python -u /app/ml_pipeline/alert_bot.py
    depends_on:
      - dragonfly
      - postgres
    env_file: .env
    restart: unless-stopped

  training-flow:
    build: .
    command: >
      sh -c "
        pip install dbt-postgres -q --no-cache-dir &&
        python -u /app/ml_pipeline/training_flow.py
      "
    volumes:
      - model_storage:/app/models
      - ./ml_pipeline:/app/ml_pipeline
      - ./dbt:/dbt
    depends_on:
      - prefect-server
      - kafka
      - dragonfly
      - postgres
    env_file: .env
    environment:
      MODEL_PATH: /app/models/dxy_model.pkl
      ROLLING_WINDOW: "20"
      PREDICT_INTERVAL: "60"
      VOL_SCALE: "5.5"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    volumes:
      - ./grafana/loki:/etc/loki
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./grafana/promtail:/etc/promtail
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    depends_on:
      - prometheus
    restart: unless-stopped

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
    entrypoint: ["/bin/sh"]
    command: ["/dbt/start.sh"]
    volumes:
      - ./dbt:/dbt
    working_dir: /dbt
    environment:
      DBT_PROFILES_DIR: /dbt/profiles
      DBT_HOST: postgres
      DBT_PORT: 5432
      DBT_USER: ${POSTGRES_USER}
      DBT_PASSWORD: ${POSTGRES_PASSWORD}
      DBT_DATABASE: ${POSTGRES_DB}
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
  dfdata:
  model_storage:
  grafana-data:
  prometheus-data:
  loki-data:
